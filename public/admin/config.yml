# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: JMON73/site-association
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/10d499c4-244f-4097-8f62-5227c2feef22/pkce
  auth_token_endpoint: /sites/10d499c4-244f-4097-8f62-5227c2feef22/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://carau.netlify.app

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "actualites"
    label: "Actualités"
    folder: "src/content/actualites"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Résumé", name: "resume", widget: "text" }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Contenu", name: "body", widget: "markdown" }
  - name: "evenements"
    label: "Agenda & Événements"
    folder: "src/content/evenements"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - label: "Type d'événement"
        name: "type"
        widget: "select"
        options: ["Match", "Repas", "Voyage", "Assemblée générale", "Action solidaire", "Autre"]
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Lieu", name: "lieu", widget: "string", required: false }
      - { label: "Ouvert aux familles", name: "familles", widget: "boolean", default: true }
      - { label: "Image principale", name: "image", widget: "image", required: false }
      - { label: "Résumé court", name: "resume", widget: "text" }
      - { label: "Description complète", name: "body", widget: "markdown" }
      - { label: "Lien d'inscription", name: "lien_inscription", widget: "string", required: false }
      - { label: "Événement passé", name: "termine", widget: "boolean", default: false }
  - name: "anciens"
    label: "Les Anciens"
    folder: "src/content/anciens"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nom complet", name: "nom", widget: "string" }
      - { label: "Photo", name: "photo", widget: "image", required: false }
      - { label: "Période au club", name: "periode", widget: "string" }
      - { label: "Poste", name: "poste", widget: "string", required: false }
      - { label: "Témoignage", name: "body", widget: "markdown", required: false }
  - name: "galeries"
    label: "Galeries photos"
    folder: "src/content/galeries"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titre de l'album", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - label: "Photos"
        name: "photos"
        widget: "list"
        field: { label: "Photo", name: "image", widget: "image" }
  - name: "partenaires"
    label: "Partenaires"
    folder: "src/content/partenaires"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nom du partenaire", name: "nom", widget: "string" }
      - { label: "Logo", name: "logo", widget: "image" }
      - { label: "Site web", name: "site", widget: "string", required: false }
      - label: "Niveau de partenariat"
        name: "niveau"
        widget: "select"
        options: ["Principal", "Secondaire"]
  - name: "pages"
    label: "Pages"
    files:
      - label: "Accueil"
        name: "accueil"
        file: "src/content/pages/accueil.md"
        fields:
          - { label: "Titre", name: "title", widget: "string" }
          - { label: "Introduction", name: "intro", widget: "text" }